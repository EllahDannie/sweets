<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - SweetTooth</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">SweetTooth</h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="welcome.html">HOME</a></li>
                    <li><a href="allcakes.html">ALL CAKES</a></li>
                    <li><a href="aboutus.html">ABOUT</a></li>
                    <li><a href="delivery.html">DELIVERY</a></li>
                </ul>
            </div>
            <div class="search">
                <input class="srch" type="search" name="" placeholder="Type to Text">
                <button class="btn"><a href="#">Search</a></button>
            </div>
        </div>
        <div class="content">
            <h1>Welcome to <span id="userGreeting">SweetTooth</span></h1>
            <p class="par">You have successfully logged in! Enjoy our delicious cakes and delicacies.</p>
            <button class="cn"><a href="#" onclick="logout()">Log Out</a></button>

            <div class="cakes-section">
                <h2>Our Featured Cakes</h2>
                <p>Browse our collection of delicious treats below:</p>
                <!-- You can add cake items here later -->
            </div>
        </div>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script>
        // Display user's name on welcome page
        var userName = localStorage.getItem('userName');
        if (userName) {
            document.getElementById('userGreeting').textContent = 'Welcome, ' + userName;
        }

        function logout() {
            // Clear user data from localStorage
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userPassword');
            localStorage.removeItem('userName');
            alert('You have been logged out.');
            // Redirect to home/login page
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
