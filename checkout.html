<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="navbar">
        <div class="icon">
            <a href="index.html" class="logo">
                <img class="logo-img" src="images/logos/sweettoothlogo.png" alt="SweetTooth">
            </a>
        </div>
        <div class="menu">
            <ul class="menu-list">
                <li><a href="index.html">HOME</a></li>
                <li><a href="allcakes.html">ALL CAKES</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="delivery.html">DELIVERY</a></li>
            </ul>
        </div>

    </div>

    <div class="checkout-page">
        <div class="order-summary ">
            <h3>Order Summary</h3>
            <div class="cart-items">
                <div class="item">
                    <span>Strawberry Cake x1</span>
                    <span>KES 3,225</span>
                </div>
                <div class="item">
                    <span>Chocolate Cake x1</span>
                    <span>KES 3,870</span>
                </div>
                <div class="item">
                    <span>Birthday Cake x1</span>
                    <span>KES 4,515</span>
                </div>
            </div>
            <div class="summary">
                <p>Subtotal: KES 11,610</p>
                <p>Shipping: KES 1,290</p>
                <p><strong>Total: KES 12,900</strong></p>
            </div>
            <button class="checkout-btn" onclick="location.href='#checkoutForm'">Place Order</button>
        </div>
        <br><br><br>
        <div class="checkout-container">
            <h3>Checkout Form</h3>
            <form class="checkout-form" id="checkoutForm">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="number">Phone Number:</label>
                <input type="text" id="number" name="number" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="address">Shipping Address:</label>
                <input type="text" id="address" name="address" required>

                <label for="payment">Payment Method:</label>
                <select id="payment" name="payment" required>
                    <option value="credit-card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="m-pesa">M-pesa</option>
                    <option value="cash-on-delivery">Cash on Delivery</option>
                </select>

                <button type="submit">Checkout</button>
            </form>

        </div>
    </div>

    </div>

</body>
<footer></footer>
<p>&copy; 2024 Sweet Tooth Bakery. All rights reserved.</p>
</footer>

</html>
