<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="signup-main">
        <div class="navbar">
            <div class="icon">
                <a href="index.html" class="logo">
                    <img class="logo-img" src="images/logos/sweettoothlogo.png" alt="SweetTooth">
                </a>
            </div>

            <div class="signup-form">
                <h1>Sign Up</h1>
                <form onsubmit="redirectToLogin(event)">
                    <p>First Name</p>
                    <input type="text" name="fname" placeholder="First Name">
                    <p>Last Name</p>
                    <input type="text" name="lname" placeholder="Last Name">
                    <p>Email Address</p>
                    <input type="email" name="email" placeholder="Email Address">
                    <p>Password</p>
                    <input type="password" name="password" placeholder="Password">
                    <p>Confirm Password</p>
                    <input type="password" name="cpassword" placeholder="Confirm Password">
                    <button type="submit">Sign Up</button>
                </form>

            </div>

        </div>

        <script>
            function redirectToLogin(event) {
                event.preventDefault();
                var form = event.target;
                var fname = form.fname.value.trim();
                var lname = form.lname.value.trim();
                var email = form.email.value.trim();
                var password = form.password.value;
                var cpassword = form.cpassword.value;

                if (!fname || !lname || !email || !password || !cpassword) {
                    alert('Please fill in all fields.');
                    return;
                }
                if (password !== cpassword) {
                    alert('Passwords do not match.');
                    return;
                }

                localStorage.setItem('userEmail', email);
                localStorage.setItem('userPassword', password);
                localStorage.setItem('userName', fname + ' ' + lname);
                alert('Sign-up successful! Please log in.');

                window.location.href = 'index.html';
            }
        </script>
</body>

</html>
